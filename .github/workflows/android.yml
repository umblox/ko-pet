name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # SATU ALUR: Kompilasi biner dengan membawa Secret Key & Pengaturan RAM Proyek
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: current # Menggunakan engine Gradle global versi stabil terbaru

    # Ganti './gradlew assembleDebug' menjadi perintah 'gradle' murni
    - name: Build with Gradle
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: gradle assembleDebug
      
    # PROSES AKHIR: Ekstrak hasil biner menjadi file APK siap unduh
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Pet-Buddy-Groq
        path: app/build/outputs/apk/debug/app-debug.apk
        
